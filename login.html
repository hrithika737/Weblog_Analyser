<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In - Web Log Analyzer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --ink: #17202a;
            --muted: #65748b;
            --line: #d9e1ec;
            --page: #f5f7fb;
            --accent: #0f766e;
            --accent-dark: #115e59;
        }
        body {
            background: var(--page);
            color: var(--ink);
            font-family: Arial, sans-serif;
            letter-spacing: 0;
        }
        .navbar {
            background: #ffffff;
            border-bottom: 1px solid var(--line);
        }
        .navbar-brand {
            color: var(--ink);
            font-weight: 700;
        }
        .auth-shell {
            min-height: calc(100vh - 58px);
            display: grid;
            place-items: center;
            padding: 48px 16px;
        }
        .auth-card {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 18px 50px rgba(23, 32, 42, 0.08);
            max-width: 440px;
            padding: 32px;
            width: 100%;
        }
        .auth-card h1 {
            font-size: 1.75rem;
            font-weight: 800;
        }
        .auth-card p {
            color: var(--muted);
        }
        .form-control {
            border-color: var(--line);
            min-height: 46px;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.14);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            min-height: 46px;
        }
        .btn-primary:hover {
            background: var(--accent-dark);
            border-color: var(--accent-dark);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('landing') }}">Web Log Analyzer</a>
        </div>
    </nav>

    <main class="auth-shell">
        <section class="auth-card">
            <h1>Sign in</h1>
            <p class="mb-4">Access the analyzer workspace.</p>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input id="username" type="text" class="form-control" name="username" placeholder="Analyst name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" type="email" class="form-control" name="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" type="password" class="form-control" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Continue</button>
            </form>
        </section>
    </main>
</body>
</html>
